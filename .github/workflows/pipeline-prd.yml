name: Azure Terraform PRD

on:
  workflow_call:
    inputs:
      action:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  Plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id:       "1c43011f-40e9-45a2-9bf3-d5e0070251d4"
          tenant-id:       "d91ee3df-ab03-4bb1-a529-13e61ccc07f7"
          subscription-id: "c0a74f32-1918-4f3e-a601-9eb75458f364"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Copy tfvars (PRD)
        run: cp ./prd/values.auto.tfvars ./values.auto.tfvars

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=pansaar-rg-prd" \
            -backend-config="storage_account_name=pansaarstatestorageprd" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  Apply:
    if: inputs.action == 'apply'
    needs: Plan
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id:       "1c43011f-40e9-45a2-9bf3-d5e0070251d4"
          tenant-id:       "d91ee3df-ab03-4bb1-a529-13e61ccc07f7"
          subscription-id: "c0a74f32-1918-4f3e-a601-9eb75458f364"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Copy tfvars (PRD)
        run: cp ./prd/values.auto.tfvars ./values.auto.tfvars

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=pansaar-rg-prd" \
            -backend-config="storage_account_name=pansaarstatestorageprd" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan