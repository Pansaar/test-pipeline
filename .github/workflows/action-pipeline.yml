name: Deploy Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - tst
          - prd

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    uses: ./.github/workflows/pipeline-${{ github.event.inputs.environment }}.yml