name: Deploy Azure Infrastructure

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID:       "39d66104-5771-4b1a-8761-ff2a9df9d6ef"
      ARM_SUBSCRIPTION_ID: "c0a74f32-1918-4f3e-a601-9eb75458f364"
      ARM_TENANT_ID:       "d91ee3df-ab03-4bb1-a529-13e61ccc07f7"
      ARM_USE_OIDC:        true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          ARM_CLIENT_ID:       "39d66104-5771-4b1a-8761-ff2a9df9d6ef"
          ARM_SUBSCRIPTION_ID: "c0a74f32-1918-4f3e-a601-9eb75458f364"
          ARM_TENANT_ID:       "d91ee3df-ab03-4bb1-a529-13e61ccc07f7"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan